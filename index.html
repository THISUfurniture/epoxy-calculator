  .note {

    <div class="card-body">

    <label for="mode">ප්‍රමාණය දෙන විදිහ</label>
    <select id="mode">
      <option value="sqft">වර්ග අඩි (Sq ft) කෙලින්ම</option>
      <option value="dims">හතරැස් / සෘජුකෝණාස්‍ර (දිග x පළල)</option>
      <option value="round">රවුම් (Round mold)</option>
    </select>

    <div id="sqftBlock">
      <label for="sqft">වර්ග අඩි (Sq ft)</label>
      <input type="number" id="sqft" value="1" min="0" step="0.1">
    </div>

    <div id="dimsBlock" style="display:none;">
      <label for="unitSel">ඒකකය (Unit)</label>
      <select id="unitSel">
        <option value="ft">අඩි (feet)</option>
        <option value="in">අඟල් (inches)</option>
        <option value="cm">සෙන්ටිමීටර් (cm)</option>
      </select>

      <div style="display:flex; gap:10px;">
        <div style="flex:1;">
          <label for="lenIn">දිග (Length)</label>
          <input type="number" id="lenIn" value="12" min="0" step="0.1">
        </div>
        <div style="flex:1;">
          <label for="widIn">පළල (Width)</label>
          <input type="number" id="widIn" value="12" min="0" step="0.1">
        </div>
      </div>
      <p style="font-size:12px; color:#888780; margin:8px 0 0;">වර්ග අඩි: <span id="sqftFromDims">1.00</span> sq ft</p>
    </div>

    <div id="roundBlock" style="display:none;">
      <label for="unitSelRound">ඒකකය (Unit)</label>
      <select id="unitSelRound">
        <option value="ft">අඩි (feet)</option>
        <option value="in">අඟල් (inches)</option>
        <option value="cm">සෙන්ටිමීටර් (cm)</option>
      </select>

      <label for="diaIn">විෂ්කම්භය (Diameter)</label>
      <input type="number" id="diaIn" value="12" min="0" step="0.1">
      <p style="font-size:12px; color:#888780; margin:8px 0 0;">වර්ග අඩි: <span id="sqftFromRound">0.78</span> sq ft</p>
    </div>

    <label for="thickness">ඝණකම (අගල් / inches)</label>
    <select id="thickness">
      <option value="0.5">0.5"</option>
      <option value="1" selected>1"</option>
      <option value="1.5">1.5"</option>
      <option value="2">2"</option>
      <option value="custom">වෙනත් ඝණකමක් (Custom)</option>
    </select>
    <input type="number" id="customThickness" placeholder="ඝණකම අගලින් (e.g. 0.75)" min="0" step="0.05" style="display:none; margin-top:8px;">

    <label for="density">Density (g/cm³)</label>
    <input type="number" id="density" value="1.1" min="0.5" max="2" step="0.01">

    <button id="calcBtn" type="button" style="width:100%; margin-top:16px; padding:12px; background:#000; color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600;">ගණනය කරන්න (Calculate)</button>

    <div class="result">
      <span>අවශ්‍ය Epoxy බර</span>
      <span id="result">— kg</span>
    </div>

    <p class="note">Density එක ඔබ පාවිච්චි කරන Epoxy brand එකේ TDS (Technical Data Sheet) එකෙන් confirm කරගන්න. Formula: kg = sq ft × inch × 2.598 × (density ÷ 1.1)</p>
    </div>
  </div>

<script>
  const modeEl = document.getElementById('mode');
  const sqftBlock = document.getElementById('sqftBlock');
  const dimsBlock = document.getElementById('dimsBlock');
  const roundBlock = document.getElementById('roundBlock');
  const sqftEl = document.getElementById('sqft');
  const unitSel = document.getElementById('unitSel');
  const lenEl = document.getElementById('lenIn');
  const widEl = document.getElementById('widIn');
  const sqftFromDimsEl = document.getElementById('sqftFromDims');
  const unitSelRound = document.getElementById('unitSelRound');
  const diaEl = document.getElementById('diaIn');
  const sqftFromRoundEl = document.getElementById('sqftFromRound');
  const thickEl = document.getElementById('thickness');
  const customEl = document.getElementById('customThickness');
  const densityEl = document.getElementById('density');
  const resultEl = document.getElementById('result');

  modeEl.addEventListener('change', () => {
    sqftBlock.style.display = 'none';
    dimsBlock.style.display = 'none';
    roundBlock.style.display = 'none';
    if (modeEl.value === 'sqft') sqftBlock.style.display = 'block';
    if (modeEl.value === 'dims') dimsBlock.style.display = 'block';
    if (modeEl.value === 'round') roundBlock.style.display = 'block';
    calc();
  });

  thickEl.addEventListener('change', () => {
    customEl.style.display = thickEl.value === 'custom' ? 'block' : 'none';
    calc();
  });

  [sqftEl, customEl, densityEl, unitSel, lenEl, widEl, unitSelRound, diaEl]
    .forEach(el => el.addEventListener('input', calc));

  function unitToSqft(value, unit){
    if (unit === 'ft') return value;
    if (unit === 'in') return value / 144;
    if (unit === 'cm') return value / 929.03;
    return value;
  }

  function getSqft(){
    if (modeEl.value === 'sqft') {
      return parseFloat(sqftEl.value) || 0;
    }
    if (modeEl.value === 'dims') {
      const len = parseFloat(lenEl.value) || 0;
      const wid = parseFloat(widEl.value) || 0;
      let sqft = 0;
      if (unitSel.value === 'ft') sqft = len * wid;
      else if (unitSel.value === 'in') sqft = (len * wid) / 144;
      else if (unitSel.value === 'cm') sqft = (len * wid) / 929.03;
      sqftFromDimsEl.textContent = sqft.toFixed(2);
      return sqft;
    }
    if (modeEl.value === 'round') {
      const dia = parseFloat(diaEl.value) || 0;
      const radius = dia / 2;
      let areaInUnit = Math.PI * radius * radius;
      let sqft = 0;
      if (unitSelRound.value === 'ft') sqft = areaInUnit;
      else if (unitSelRound.value === 'in') sqft = areaInUnit / 144;
      else if (unitSelRound.value === 'cm') sqft = areaInUnit / 929.03;
      sqftFromRoundEl.textContent = sqft.toFixed(2);
      return sqft;
    }
    return 0;
  }

  function calc(){
    const sqft = getSqft();
    const thick = thickEl.value === 'custom'
      ? (parseFloat(customEl.value) || 0)
      : parseFloat(thickEl.value);
    const density = parseFloat(densityEl.value) || 1.1;
    const cubicInches = sqft * 144 * thick;
    const cm3 = cubicInches * 16.387;
    const kg = (cm3 * density) / 1000;
    resultEl.textContent = kg.toFixed(2) + ' kg';
  }
  document.getElementById('calcBtn').addEventListener('click', calc);
  calc();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
